{% extends "base.html" %}

{% block title %}Home - Real-time Chat{% endblock %}

{% block content %}
<div class="hero">
  <h1>Welcome to ChatApp</h1>
  <p>Real-time messaging at your fingertips. Connect, chat, and collaborate instantly.</p>

  {% if user.is_authenticated %}
    <div class="hero-actions">
      <a href="{% url 'accounts:profile' %}" class="btn btn-outline">Edit Profile</a>
    </div>
  {% else %}
    <div class="hero-actions">
      <a href="{% url 'login' %}" class="btn btn-outline">Login</a>
      <a href="{% url 'accounts:signup' %}" class="btn btn-primary">Sign Up</a>
    </div>
  {% endif %}
</div>
{% endblock %}
